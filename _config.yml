# Site Settings
title                    : "Jiazhe Wei (魏佳哲)"
description              : "Incoming Master Student at Nanjing University"
direction                : "Focusing on Highly Controllable Visual Generative Models, World Foundation Models, and Efficient & Unified Multi-modal Learning."
repository               : "JiazheWei/JiazheWei.github.io"

# SEO Related
google_site_verification : "yy_3iiS_X6pJdegdwitJMrH0LRLHXwpjrV9RKLXxKjg"
bing_site_verification   :
baidu_site_verification  :

# Site Author
author:
  name          : "Jiazhe Wei <br /> (魏佳哲)"
  avatar        : "images/profile.jpg"
  email         : "jzw6545@gmail.com"
  googlescholar : "https://scholar.google.com/citations?user=UgKRQJwAAAAJ&hl=en&oi=ao"
  github        : "JiazheWei"
  twitter       : "jzw1365297"
  wechat        : "images/wechat.jpg"


# Reading Files
include:
  - .htaccess
  - _pages
  - files
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - CHANGELOG
  - Capfile
  - Gemfile
  - Gruntfile.js
  - LICENSE
  - README
  - Rakefile
  - config
  - docs
  - gulpfile.js
  - log
  - node_modules
  - package.json
  - tmp
  - vendor
keep_files:
  - .git
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"


# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false


# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Defaults
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: default
      author_profile: true


# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed


# Outputting
permalink: /:categories/:title/
timezone: Asia/Shanghai


# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-redirect-from
whitelist:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji


# HTML Compression
compress_html:
  clippings: all
  ignore:
    envs: development
